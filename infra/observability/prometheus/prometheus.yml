global:
  scrape_interval: 10s

scrape_configs:
  - job_name: "user-api"
    metrics_path: "/q/metrics"
    static_configs:
      - targets: ["user-api:8080"]

  - job_name: "product-api"
    metrics_path: "/q/metrics"
    static_configs:
      - targets: ["product-api:8080"]

  - job_name: "order-api"
    metrics_path: "/q/metrics"
    static_configs:
      - targets: ["order-api:8080"]

  - job_name: "delivery-estimator-api"
    metrics_path: "/q/metrics"
    static_configs:
      - targets: ["delivery-estimator-api:8080"]

  - job_name: "fraud-detector-api"
    metrics_path: "/q/metrics"
    static_configs:
      - targets: ["fraud-detector-api:8080"]
  
  - job_name: "ai-chat-bff"
    metrics_path: /q/metrics
    static_configs:
      - targets: ["ai-chat-bff:8080"]

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]
