quarkus.http.port=8080
quarkus.application.name=payment-service

# PostgreSQL
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${POSTGRES_USER:ecommerce}
quarkus.datasource.password=${POSTGRES_PASSWORD:ecommerce}
quarkus.datasource.jdbc.url=${POSTGRES_JDBC_URL:jdbc:postgresql://postgres:5432/ecommerce}

# Hibernate/Flyway
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.database.default-schema=payments
quarkus.flyway.migrate-at-start=true
quarkus.flyway.schemas=payments
quarkus.flyway.create-schemas=true
quarkus.flyway.locations=db/migration

# RabbitMQ
rabbitmq-host=${RABBITMQ_HOST:rabbitmq}
rabbitmq-port=${RABBITMQ_PORT:5672}
rabbitmq-username=${RABBITMQ_USERNAME:ecommerce}
rabbitmq-password=${RABBITMQ_PASSWORD:ecommerce}
rabbitmq-virtual-host=${RABBITMQ_VIRTUAL_HOST:/}

# Incoming: payment.requested
mp.messaging.incoming.payment-requested-in.connector=smallrye-rabbitmq
mp.messaging.incoming.payment-requested-in.queue.name=payment.requested
mp.messaging.incoming.payment-requested-in.exchange.name=ecommerce.events
mp.messaging.incoming.payment-requested-in.exchange.type=topic
mp.messaging.incoming.payment-requested-in.routing-keys=payment.requested

# Outgoing: payment.approved
mp.messaging.outgoing.payment-approved-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.payment-approved-out.exchange.name=ecommerce.events
mp.messaging.outgoing.payment-approved-out.exchange.type=topic
mp.messaging.outgoing.payment-approved-out.exchange.declare=false
mp.messaging.outgoing.payment-approved-out.default-routing-key=payment.approved

# Outgoing: payment.rejected
mp.messaging.outgoing.payment-rejected-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.payment-rejected-out.exchange.name=ecommerce.events
mp.messaging.outgoing.payment-rejected-out.exchange.type=topic
mp.messaging.outgoing.payment-rejected-out.exchange.declare=false
mp.messaging.outgoing.payment-rejected-out.default-routing-key=payment.rejected

# Fake payment gateway / WireMock
quarkus.rest-client.payment-gateway.url=${PAYMENT_GATEWAY_URL:http://payment-gateway-mock:8080}
quarkus.rest-client.payment-gateway.connect-timeout=1000
quarkus.rest-client.payment-gateway.read-timeout=3000

# OpenAPI/Swagger
quarkus.swagger-ui.always-include=true

# Health
quarkus.smallrye-health.root-path=/q/health

# Observability
quarkus.otel.enabled=${OTEL_ENABLED:true}
quarkus.otel.service.name=payment-service
quarkus.otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4317}
quarkus.otel.exporter.otlp.protocol=grpc

# Metrics
quarkus.micrometer.export.prometheus.enabled=true